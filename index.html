  <style>
    :root {
      --bg-a: #fff4df;
      --bg-b: #dceeff;
      --panel: rgba(255, 255, 255, 0.85);
      --panel-border: rgba(255, 255, 255, 0.95);
      --text: #1c2230;
      --muted: #5a6478;
      --accent: #f45158;
      --accent-2: #176fdb;
      --shadow: 0 18px 52px rgba(17, 34, 73, 0.18);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--text);
      font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif;
      background: linear-gradient(160deg, var(--bg-a) 0%, var(--bg-b) 100%);
      overflow-x: hidden;
    }

    .ambient {
      position: fixed;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(6px);
      z-index: 0;
      animation: drift 10s ease-in-out infinite;
    }

    .ambient-a {
      width: 320px;
      height: 320px;
      top: -100px;
      left: -90px;
      background: radial-gradient(circle at 35% 35%, rgba(244, 81, 88, 0.35), rgba(244, 81, 88, 0));
    }

    .ambient-b {
      width: 380px;
      height: 380px;
      right: -120px;
      top: 24%;
      animation-delay: -4s;
      background: radial-gradient(circle at 40% 40%, rgba(23, 111, 219, 0.28), rgba(23, 111, 219, 0));
    }

    .ambient-c {
      width: 260px;
      height: 260px;
      left: 30%;
      bottom: -90px;
      animation-delay: -7s;
      background: radial-gradient(circle at 45% 45%, rgba(255, 160, 60, 0.34), rgba(255, 160, 60, 0));
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(940px, calc(100% - 2rem));
      margin: clamp(0.8rem, 2vw, 2rem) auto;
      padding: clamp(1.1rem, 2.8vw, 2.1rem);
      border-radius: var(--radius);
      border: 1px solid var(--panel-border);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      animation: rise 0.6s ease-out both;
    }

    .header {
      text-align: center;
      margin-bottom: 1rem;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent-2);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 0.76rem;
      font-weight: 700;
    }

    h1 {
      margin: 0.45rem 0 0;
      font-family: "Bricolage Grotesque", "Avenir Next", sans-serif;
      font-size: clamp(2rem, 4.1vw, 3.15rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .brand-title {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
    }

    .brand-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      color: inherit;
      text-decoration: none;
    }

    .brand-home:focus-visible {
      outline: 2px solid rgba(23, 111, 219, 0.6);
      outline-offset: 6px;
      border-radius: 10px;
    }

    .insta-logo {
      width: clamp(1.6rem, 2.4vw, 2rem);
      height: clamp(1.6rem, 2.4vw, 2rem);
      fill: var(--accent);
      flex: 0 0 auto;
    }

    .subtitle {
      margin: 0.7rem auto 0;
      max-width: 44ch;
      color: var(--muted);
      font-size: clamp(0.95rem, 1.2vw, 1.05rem);
    }

    .search-panel {
      margin-top: 1.2rem;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.96);
      background: rgba(255, 255, 255, 0.9);
      padding: clamp(0.9rem, 2.4vw, 1.3rem);
    }

    .search-label {
      margin: 0 0 0.65rem;
      text-align: center;
      color: #344159;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .chip-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-bottom: 0.9rem;
    }

    .chip {
      border-radius: 999px;
      padding: 0.34rem 0.68rem;
      font-size: 0.72rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-weight: 600;
      color: #283147;
      background: linear-gradient(120deg, rgba(23, 111, 219, 0.15), rgba(244, 81, 88, 0.12));
    }

    .gcsc-find-more-on-google-root,
    .gsc-above-wrapper-area,
    .gcsc-branding,
    .gsc-branding,
    .gcsc-more-maybe-branding-root,
    .gsc-resultsHeader,
    .gsc-cursor-box .gsc-cursor-current-page,
    .gsc-refinementsArea {
      display: none;
    }

    .gsc-control-cse {
      padding: 0 !important;
      border: 0 !important;
      background: transparent !important;
      font-family: "IBM Plex Sans", "Segoe UI", Arial, sans-serif !important;
    }

    .gsc-search-box,
    .gsc-search-box-tools {
      margin-bottom: 0 !important;
    }

    .gsib_a {
      padding: 0 !important;
      width: 100% !important;
    }

    .gsc-input-box table,
    .gsc-input-box tbody,
    .gsc-input-box tr,
    .gsc-input-box td {
      border: 0 !important;
      margin: 0 !important;
      padding: 0 !important;
      background: transparent !important;
      vertical-align: middle !important;
    }

    .gsc-input-box .gscb_a,
    .gsc-input-box .gscb_a * {
      display: none !important;
      width: 0 !important;
    }

    .gsc-input-box {
      border: 2px solid rgba(31, 44, 76, 0.12) !important;
      border-radius: 14px !important;
      background: #fff !important;
      height: 50px !important;
      padding: 0 0.6rem !important;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .gsc-input-box:focus-within {
      border-color: rgba(244, 81, 88, 0.48) !important;
      box-shadow: 0 0 0 4px rgba(244, 81, 88, 0.12);
    }

    input.gsc-input,
    .gsib_a input {
      background: transparent !important;
      background-image: none !important;
      font-size: 1rem !important;
      color: #1f2738 !important;
      padding: 0 0.9rem !important;
      text-indent: 0 !important;
      margin: 0 !important;
      line-height: 1.5 !important;
      height: 46px !important;
      box-shadow: none !important;
    }

    .gsib_b,
    .gsst_b {
      display: none !important;
    }

    .gsc-search-button-v2 {
      border-radius: 14px !important;
      border: 0 !important;
      background: linear-gradient(120deg, var(--accent), #ff7b3f) !important;
      padding: 13px 16px !important;
      cursor: pointer;
    }

    .gsc-search-button-v2:hover,
    .gsc-search-button-v2:focus {
      filter: saturate(1.07);
    }

    .gsc-results-wrapper-visible {
      margin-top: 0.9rem;
      border-top: 1px solid rgba(31, 44, 76, 0.08);
      padding-top: 0.9rem;
    }

    .gsc-webResult.gsc-result,
    .gsc-result {
      border: 1px solid rgba(31, 44, 76, 0.08) !important;
      border-radius: 12px !important;
      padding: 0.75rem 0.85rem !important;
      margin-bottom: 0.55rem !important;
      background: #ffffff !important;
      transition: transform 0.14s ease, border-color 0.14s ease;
    }

    .gsc-webResult.gsc-result:hover {
      transform: translateY(-1px);
      border-color: rgba(23, 111, 219, 0.32) !important;
    }

    .gsc-result .gs-title,
    .gsc-result .gs-title b {
      color: #213459 !important;
      text-decoration: none !important;
      font-weight: 700 !important;
    }

    .gsc-result .gs-title:hover {
      color: #f45158 !important;
    }

    .gsc-result .gs-snippet,
    .gsc-result .gs-visibleUrl {
      color: #5e6a80 !important;
    }

    .footer {
      margin-top: 0.85rem;
      text-align: center;
      color: #687185;
      font-size: 0.8rem;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes drift {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(14px);
      }
    }

    @media (max-width: 768px) {
      .page {
        width: calc(100% - 1rem);
        margin: 0.5rem auto;
        border-radius: 18px;
      }

      .search-panel {
        border-radius: 13px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
